<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Fact or Fiction</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
    <style>
        .fact-card-container {
            position: relative;
            width: 300px;
            height: 400px;
            margin: 40px auto;
            perspective: 1000px;
        }
        .fact-card {
            width: 100%;
            height: 100%;
            background: #1e1e2e;
            border: 3px solid #3498db;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            text-align: center;
            font-size: 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
            cursor: grab;
            user-select: none;
        }
        .fact-card:active { cursor: grabbing; }
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .btn-fact {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-weight: bold;
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-true { background: #2ecc71; color: white; }
        .btn-false { background: #e74c3c; color: white; }
        .btn-fact:hover { transform: scale(1.1); }
        
        .score-box { font-size: 1.5rem; color: #ffcc00; margin-top: 20px; }
        .feedback { position: absolute; top: -40px; width: 100%; font-size: 1.2rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>🔥 Fact or Fiction</h1>
                <div class="score-box">Score: <span id="score">0</span> | Remaining: <span id="left">0</span></div>
                
                <div class="fact-card-container">
                    <div id="feedback" class="feedback"></div>
                    <div id="card" class="fact-card">
                        <span id="fact-text">Press Start to Begin!</span>
                    </div>
                </div>

                <div class="controls" id="game-controls" style="display: none;">
                    <button class="btn-fact btn-false" onclick="handleChoice(false)">❌ False</button>
                    <button class="btn-fact btn-true" onclick="handleChoice(true)">✅ True</button>
                </div>

                <button id="start-btn" class="action-button" onclick="startGame()">Start Game</button>
                <br>
                <a href="games.html" class="action-button btn-reset" style="text-decoration: none; display: inline-block;">← Back to Menu</a>
            </section>
        </main>
    </div>

    <script>
        const facts = [
            { text: "Big Ben is the name of the clock tower in London.", isTrue: false }, // It's the bell
            { text: "Poland's national animal is the White Eagle.", isTrue: true },
            { text: "The London Underground is the oldest in the world.", isTrue: true },
            { text: "Wawel Castle is located in Warsaw.", isTrue: false }, // Kraków
            { text: "Poland borders 7 countries.", isTrue: true },
            { text: "English is the only official language of the UK.", isTrue: false }, // Welsh, Gaelic etc.
            { text: "Kraków was once the capital of Poland.", isTrue: true },
            { text: "The British Royal family is not allowed to eat shellfish.", isTrue: true },
            { text: "Poland is the largest producer of amber in the world.", isTrue: true },
            { text: "Stonehenge is older than the Great Pyramids.", isTrue: true }
        ];

        let currentIdx = 0;
        let score = 0;
        let gameActive = false;

        function startGame() {
            score = 0;
            currentIdx = 0;
            gameActive = true;
            document.getElementById('start-btn').style.display = 'none';
            document.getElementById('game-controls').style.display = 'flex';
            updateUI();
            showFact();
        }

        function showFact() {
            if (currentIdx >= facts.length) {
                endGame();
                return;
            }
            const card = document.getElementById('card');
            card.style.transform = 'translateX(0) rotate(0)';
            card.style.opacity = '1';
            document.getElementById('fact-text').innerText = facts[currentIdx].text;
        }

        function handleChoice(choice) {
            if (!gameActive) return;

            const correct = facts[currentIdx].isTrue;
            const feedback = document.getElementById('feedback');
            const card = document.getElementById('card');

            if (choice === correct) {
                score++;
                feedback.innerText = "CORRECT! ✨";
                feedback.style.color = "#2ecc71";
                card.style.transform = choice ? 'translateX(200px) rotate(20deg)' : 'translateX(-200px) rotate(-20deg)';
            } else {
                feedback.innerText = "WRONG! ❌";
                feedback.style.color = "#e74c3c";
                card.style.transform = choice ? 'translateX(200px) rotate(20deg)' : 'translateX(-200px) rotate(-20deg)';
            }
            card.style.opacity = '0';

            currentIdx++;
            updateUI();
            
            setTimeout(() => {
                feedback.innerText = "";
                showFact();
            }, 600);
        }

        function updateUI() {
            document.getElementById('score').innerText = score;
            document.getElementById('left').innerText = facts.length - currentIdx;
        }

        function endGame() {
            gameActive = false;
            document.getElementById('fact-text').innerText = `Finish! \n Your Score: ${score}/${facts.length}`;
            document.getElementById('game-controls').style.display = 'none';
            document.getElementById('start-btn').style.display = 'inline-block';
            document.getElementById('start-btn').innerText = 'Play Again';
        }
    </script>
</body>
</html>
