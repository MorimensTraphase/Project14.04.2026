<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Quiz</title>
    <link rel="stylesheet" href="css/video.css">
    <style>
        .quiz-container { text-align: center; padding: 20px; }
        .options-grid { display: grid; gap: 10px; margin-top: 20px; }
        .option-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid #3498db;
            color: white;
            padding: 15px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
            font-family: 'Poppins', sans-serif;
        }
        .option-btn:hover { background: #3498db; }
        #result-text { margin-top: 20px; font-weight: bold; min-height: 24px; }
        .next-btn {
            margin-top: 20px;
            background: #D17338;
            border: none;
            padding: 10px 20px;
            color: white;
            border-radius: 5px;
            display: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">CultureQuiz</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li class="active"><a href="quiz.html">Quiz</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="hero container">
            <div class="builds" style="display: flex; justify-content: center;">
                <div class="build" style="max-width: 600px; width: 100%;">
                    <div class="quiz-container">
                        <h2 id="question">Loading question...</h2>
                        <div id="options" class="options-grid"></div>
                        <div id="result-text"></div>
                        <button id="next-btn" class="next-btn" onclick="nextQuestion()">Next Question</button>
                    </div>
                </div>
            </div>
        </main>
    </div>

   <script>
        const questions = [
            {
                q: "What do British people typically add to their tea?",
                a: ["Lemon", "Milk", "Salt", "Honey"],
                correct: 1
            },
            {
                q: "What is 'Pierogi' in Poland?",
                a: ["A type of dance", "A famous city", "Traditional dumplings", "A winter hat"],
                correct: 2
            },
            {
                q: "What does the Polish word 'Dres' mean?",
                a: ["A dress", "A tracksuit", "A drawer", "A dream"],
                correct: 1
            }, // Запятая добавлена
            {
                q: "What is the formal greeting in England?",
                a: ["Good morning", "Bonjour", "Heil", "Siema"],
                correct: 0 // Исправил индекс (Good morning - это 0) и убрал странные варианты
            },
            {
                q: "In England, what is the traditional name for Sausages and Mashed Potatoes?",
                a: ["Fish and Chips", "Bangers and Mash", "Shepherd's Pie", "Full English"],
                correct: 1
            },
            {
                q: "Which Polish city is famous for its Dragon and royal castle Wawel?",
                a: ["Warsaw", "Gdansk", "Krakow", "Wroclaw"],
                correct: 2
            },
            {
                q: "What is the English word for the Polish 'Pierniki'?",
                a: ["Pancakes", "Gingerbread", "Donuts", "Cookies"],
                correct: 1
            },
            {
                q: "How many cups of tea do the British drink every day in total?",
                a: ["10 million", "50 million", "165 million", "500 million"],
                correct: 2
            },
            {
                q: "Which of these is British?",
                a: ["Epstein island", "Sky Tower", "Buckingham Palace", "Notre-Dame de Paris"],
                correct: 2
            },
            {
                q: "What is a 'False Friend' in linguistics?",
                a: ["A bad translator", "A word that looks similar but has different meanings", "A slang word", "A grammatical error"],
                correct: 1
            },
            {
        q: "Which of these is a famous British 'Double-Decker'?",
        a: ["A sandwich", "A red bus", "A type of tea", "A royal guard"],
        correct: 1
    },
    {
        q: "In which country is 'Tłusty Czwartek' (Fat Thursday) a big celebration?",
        a: ["England", "USA", "Poland", "Germany"],
        correct: 2
    },
    {
        q: "What is 'Fish and Chips' usually wrapped in traditionally?",
        a: ["Newspaper", "Plastic bag", "Banana leaf", "Aluminum foil"],
        correct: 0
    },
    {
        q: "Which Polish city has a famous 'Dragon's Den' (Smocza Jama)?",
        a: ["Warsaw", "Gdansk", "Krakow", "Poznan"],
        correct: 2
    },
    {
        q: "What do the British call the 'Underground' train system in London?",
        a: ["The Metro", "The Subway", "The Tube", "The Tunnel"],
        correct: 2
    },
    {
        q: "What is the main ingredient of the Polish 'Bigos'?",
        a: ["Potatoes", "Cabbage and meat", "Fish", "Bread"],
        correct: 1
    },
    {
        q: "At what time is the traditional British 'Afternoon Tea' usually served?",
        a: ["8:00 AM", "12:00 PM", "4:00 PM", "10:00 PM"],
        correct: 2
    },
    {
        q: "Which of these is a popular Polish street food?",
        a: ["Zapiekanka", "Hot dog", "Taco", "Sushi"],
        correct: 0
    },
    {
        q: "What is the name of the British National Anthem?",
        a: ["God Save the King", "Rule Britannia", "London Calling", "Hello Goodbye"],
        correct: 0
    },
    {
        q: "What color are the post boxes in the UK?",
        a: ["Yellow", "Blue", "Green", "Red"],
        correct: 3
    }
];

        let currentQ = 0;
        let score = 0;

        function loadQuestion() {
            const qData = questions[currentQ];
            const qElement = document.getElementById("question");
            const optionsDiv = document.getElementById("options");
            
            if (!qData) return;

            qElement.innerText = qData.q;
            optionsDiv.innerHTML = "";
            document.getElementById("result-text").innerText = "";
            document.getElementById("next-btn").style.display = "none";

            qData.a.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.className = "option-btn";
                btn.innerText = opt;
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(index) {
            const correct = questions[currentQ].correct;
            const res = document.getElementById("result-text");
            const buttons = document.querySelectorAll(".option-btn");
            
            buttons.forEach(b => b.disabled = true);

            if(index === correct) {
                res.innerText = "Correct! 🎉";
                res.style.color = "#2ecc71";
                score++;
            } else {
                res.innerText = "Wrong! The answer was: " + questions[currentQ].a[correct];
                res.style.color = "#e74c3c";
            }
            document.getElementById("next-btn").style.display = "inline-block";
        }

        function nextQuestion() {
            currentQ++;
            if(currentQ < questions.length) {
                loadQuestion();
            } else {
                document.querySelector(".quiz-container").innerHTML = 
                    `<h2>Quiz Finished!</h2><h3>Your score: ${score}/${questions.length}</h3>` +
                    `<button class="next-btn" style="display:block; margin: 20px auto;" onclick="location.reload()">Try Again</button>`;
            }
        }

        // Запускаем квиз
        loadQuestion();
    </script>
</body>
</html>
