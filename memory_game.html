<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Memory Match</title>
    <link rel="stylesheet" href="css/games.css">
    <link rel="stylesheet" href="css/video.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                    <style>
    /* Центрирование всей игровой секции */
    .game-section {
        display: flex;
        flex-direction: column;
        align-items: center; /* Центровка по горизонтали */
        justify-content: center;
        text-align: center;
        width: 100%;
        min-height: 80vh; /* Занимает почти всю высоту экрана */
    }

    /* Центрирование контейнера со статистикой (PAIRS / MOVES) */
    .game-top-bar {
        display: flex;
        justify-content: center;
        width: 100%;
        margin-bottom: 20px;
    }

    /* Настройка сетки игры, чтобы она не растягивалась и была по центру */
    .memory-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr); /* 4 колонки */
        gap: 10px;
        margin: 0 auto; /* Центровка самого блока сетки */
        max-width: fit-content;
    }

    /* Центрирование кнопок управления */
    .game-controls {
        margin-top: 30px;
        display: flex;
        gap: 15px;
        justify-content: center;
    }
</style>
                </ul>
            </nav>
        </header>
        <main class="container">
            <section class="game-section">
                    <h1>🧠 Memory Match</h1>
                    <br><br>
                <div class="game-top-bar">
                    <div class="stats-container">
                        <div class="stat-group">
                            <span class="stat-label">PAIRS</span>
                            <span class="stat-value"><span id="match-count">0</span> / 8</span>
                        </div>
                        <div class="stat-divider"></div>
                        <div class="stat-group">
                            <span class="stat-label">MOVES</span>
                            <span class="stat-value" id="move-count">0</span>
                        </div>
                    </div>
                </div>

                <div class="memory-grid" id="game-board"></div>
                      <div class="game-controls">
                         <a href="games.html" class="action-button btn-reset" style="text-decoration: none; display: inline-block;">← Back to Menu</a>
                         <button class="action-button btn-reset" onclick="resetGame()">Reset</button>
                        <div id="sorting-game-engine" style="display: block; opacity: 1;">
                        <div id="visual-score-output" class="result-score-display"></div>
                    </div>
            </section>
        </main>
    </div>

    <script>
        const icons = ['🏰', '🎡', '🌭', '⚽', '🎨', '🍕', '🚗', '🎸'];
        let cards = [...icons, ...icons];
        let flippedCards = [];
        let matches = 0;
        let moves = 0;
        let canFlip = true;

        function shuffle(array) {
            return array.sort(() => Math.random() - 0.5);
        }

        function createBoard() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            const shuffledCards = shuffle([...cards]);
            
            shuffledCards.forEach((icon) => {
                const card = document.createElement('div');
                card.classList.add('memory-card');
                card.dataset.icon = icon;
                
                // Важно: создаем две стороны для 3D эффекта
                card.innerHTML = `
                    <div class="card-inner">
                        <div class="card-front">?</div>
                        <div class="card-back">${icon}</div>
                    </div>
                `;
                
                card.addEventListener('click', flipCard);
                board.appendChild(card);
            });
        }

        function flipCard() {
            if (!canFlip || this.classList.contains('flipped') || this.classList.contains('matched')) return;

            this.classList.add('flipped');
            flippedCards.push(this);

            if (flippedCards.length === 2) {
                moves++;
                canFlip = false;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            
            if (c1.dataset.icon === c2.dataset.icon) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matches++;
                flippedCards = [];
                canFlip = true;
                updateStats();
                
                if (matches === icons.length) {
                    setTimeout(() => alert(`Victory! Moves: ${moves}`), 500);
                }
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function updateStats() {
            document.getElementById('match-count').innerText = matches;
            document.getElementById('move-count').innerText = moves;
        }

        function resetGame() {
            moves = 0;
            matches = 0;
            flippedCards = [];
            canFlip = true;
            updateStats();
            createBoard();
        }

        createBoard();
    </script>
</body>
</html>
