<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Memory Match</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 0 20px; max-width: 900px; margin: 0 auto;">
                    <a href="games.html" class="action-button btn-reset" style="text-decoration: none;">← Exit</a>
                    
                    <div class="result-score-display">
                        <div class="stat-group">
                            <span class="stat-label">Pairs</span>
                            <span id="match-count" class="stat-value">0</span>
                        </div>
                        <div style="width: 1px; height: 30px; background: rgba(255,255,255,0.2);"></div>
                        <div class="stat-group">
                            <span class="stat-label">Moves</span>
                            <span id="move-count" class="stat-value">0</span>
                        </div>
                    </div>
                </div>

                <h1 style="margin-top: 30px;">🧠 Memory Match</h1>
                <div class="game-board" id="board"></div>
                <button onclick="resetGame()" class="action-button">Restart Game</button>
            </section>
        </main>
    </div>

    <script>
        const icons = ['🇬🇧', '🇵🇱', '🎡', '🥟', '💂', '🐉', '☎️', '🐂'];
        let flippedCards = [];
        let moves = 0;
        let matches = 0;
        let canFlip = true;

        function createBoard() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            const gameIcons = [...icons, ...icons].sort(() => Math.random() - 0.5);

            gameIcons.forEach(icon => {
                const card = document.createElement('div');
                card.className = 'memory-card';
                card.dataset.icon = icon;
                card.innerHTML = `
                    <div class="card-face card-back"></div>
                    <div class="card-face card-front">${icon}</div>
                `;
                card.onclick = () => flipCard(card);
                board.appendChild(card);
            });
        }

        function flipCard(card) {
            if (!canFlip || card.classList.contains('flipped') || card.classList.contains('matched')) return;
            
            card.classList.add('flipped');
            flippedCards.push(card);

            if (flippedCards.length === 2) {
                moves++;
                canFlip = false;
                updateStats();
                checkMatch();
            }
        }

        function checkMatch() {
            const [c1, c2] = flippedCards;
            if (c1.dataset.icon === c2.dataset.icon) {
                c1.classList.add('matched');
                c2.classList.add('matched');
                matches++;
                flippedCards = [];
                canFlip = true;
                updateStats();
                if (matches === icons.length) {
                    setTimeout(() => alert(`Victory! ${moves} moves.`), 500);
                }
            } else {
                setTimeout(() => {
                    c1.classList.remove('flipped');
                    c2.classList.remove('flipped');
                    flippedCards = [];
                    canFlip = true;
                }, 1000);
            }
        }

        function updateStats() {
            const mCount = document.getElementById('match-count');
            const vCount = document.getElementById('move-count');
            
            mCount.innerText = matches;
            vCount.innerText = moves;

            // Эффект "прыжка" при обновлении
            mCount.classList.add('score-bump');
            vCount.classList.add('score-bump');
            setTimeout(() => {
                mCount.classList.remove('score-bump');
                vCount.classList.remove('score-bump');
            }, 200);
        }

        function resetGame() {
            moves = 0; matches = 0; flippedCards = []; canFlip = true;
            updateStats(); createBoard();
        }

        createBoard();
    </script>
</body>
</html>
