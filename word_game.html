<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Word Scramble</title>
    <link rel="stylesheet" href="css/games.css?v=1.1"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>🔠 Word Scramble</h1>
                
                <div id="game-container" class="game-container">
                    <div class="stats-info">Word: <span id="current-index">1</span> / <span id="total-words">0</span></div>
                    
                    <div id="scrambled-word" class="word-display">-----</div>
                    <p id="hint" class="hint-text">Hint</p>
                    
                    <div class="input-area">
                        <input type="text" id="user-guess" class="word-input" placeholder="Your answer..." autocomplete="off">
                    </div>
                    
                    <div class="button-group" style="margin-top: 10px;">
                        <button class="action-button" onclick="submitAnswer()">Submit Answer</button>
                    </div>
                    
                    <p id="message" style="margin-top: 7px; font-weight: bold; min-height: 14px;"></p>
                    
                    <div class="game-controls">
                        <a href="games.html" class="action-button btn-reset" style="text-decoration: none; display: inline-block;">← Back to Menu</a>
                    </div>
                </div>

                <div id="result-screen" class="final-results" style="display: none;">
                    <div class="game-container"> <h2>Challenge Complete!</h2>
                        <div class="score-big" id="final-score-display">0 / 0</div>
                        <p id="rank-message"></p>
                        <button class="action-button" onclick="location.reload()" style="margin-top: 20px;">Play Again</button>
                        <br><br>
                        <a href="games.html" class="action-button btn-reset" style="text-decoration: none; margin-top: 10px;">Back to Menu</a>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        const words = [
            // --- ВЕЛИКОБРИТАНИЯ (UK) ---
            { original: "LONDON", hint: "The capital city of the UK 🇬🇧" },
            { original: "OXFORD", hint: "Famous for one of the oldest universities 🎓" },
            { original: "THAMES", hint: "The famous river that flows through London 🌊" },
            { original: "CASTLE", hint: "Windsor is the oldest and largest occupied one 🏰" },
            { original: "DOUBLE", hint: "The famous red bus is a ... decker 🚌" },
            { original: "ABBEY", hint: "Westminster ... - where kings are crowned 👑" },
            { original: "SCOTLAND", hint: "Home of the Loch Ness Monster 🦕" },
            { original: "STONEHENGE", hint: "Prehistoric monument of standing stones 🗿" },
            { original: "BIGBEN", hint: "The nickname for the Great Bell in London 🕰️" },
            { original: "CHELSEA", hint: "A famous football club and area in London ⚽" },
            { original: "BRISTOL", hint: "A city known for its maritime history and Banksy 🎨" },
            { original: "SHAKESPEARE", hint: "The most famous British playwright 🎭" },
            { original: "BEATLES", hint: "The legendary rock band from Liverpool 🎸" },
            { original: "PUZZLE", hint: "Something you're solving right now! 🧩" },

            // --- ПОЛЬША (PL) ---
            { original: "WARSAW", hint: "The capital city of Poland 🇵🇱" },
            { original: "KRAKOW", hint: "The ancient royal capital of Poland 🏰" },
            { original: "PIEROGI", hint: "Famous Polish dumplings 🥟" },
            { original: "GDANSK", hint: "A beautiful port city on the Baltic Sea ⚓" },
            { original: "TATRA", hint: "The highest mountain range in Poland 🏔️" },
            { original: "ZLOTY", hint: "The official currency of Poland 💰" },
            { original: "BISON", hint: "The heavy animal living in Bialowieza Forest 🦬" },
            { original: "AMBER", hint: "The 'Gold of the Baltic' 💎" },
            { original: "VISTULA", hint: "The longest river in Poland 🌊" },
            { original: "WAWEL", hint: "The royal castle in Krakow 🐉" },
            { original: "CHOPIN", hint: "Poland's most famous composer and pianist 🎹" },
            { original: "MAZUREK", hint: "A traditional Polish sweet cake 🍰" },
            { original: "COPERNICUS", hint: "The astronomer who stopped the Sun ☀️" },
            { original: "WROCLAW", hint: "The city of many bridges and gnomes 🧙‍♂️" },
            { original: "BALTIC", hint: "The sea located to the north of Poland 🏖️" }
        ];

        let currentIndex = 0;
        let score = 0;
        let shuffledWords = [];

        function initGame() {
            // Использовано верное имя массива 'words'
            shuffledWords = [...words].sort(() => Math.random() - 0.5);
            document.getElementById("total-words").innerText = shuffledWords.length;
            showWord();
        }

        function scramble(word) {
            if (word.length <= 1) return word;
            let s = word.split('').sort(() => Math.random() - 0.5).join('');
            return (s === word) ? scramble(word) : s;
        }

        function showWord() {
            if (currentIndex < shuffledWords.length) {
                const currentData = shuffledWords[currentIndex];
                document.getElementById("current-index").innerText = currentIndex + 1;
                // Используем .original вместо .word
                document.getElementById("scrambled-word").innerText = scramble(currentData.original);
                document.getElementById("hint").innerText = "Hint: " + currentData.hint;
                document.getElementById("user-guess").value = "";
                document.getElementById("message").innerText = "";
                document.getElementById("user-guess").focus();
            } else {
                showFinalResults();
            }
        }

        function submitAnswer() {
            const inputField = document.getElementById("user-guess");
            const userGuess = inputField.value.toUpperCase().trim();
            const correctAnswer = shuffledWords[currentIndex].original;
            const msg = document.getElementById("message");

            if (userGuess === "") return; // Игнорируем пустой ввод

            if (userGuess === correctAnswer) {
                score++;
                msg.innerText = "Correct! ✨";
                msg.style.color = "#2ecc71";
                currentIndex++;
                setTimeout(showWord, 600);
            } else {
                msg.innerText = "Wrong! It was " + correctAnswer;
                msg.style.color = "#e74c3c";
                currentIndex++;
                setTimeout(showWord, 1500);
            }
        }

        function showFinalResults() {
            document.getElementById("game-container").style.display = "none";
            const resScreen = document.getElementById("result-screen");
            resScreen.style.display = "block";
            
            const finalScore = document.getElementById("final-score-display");
            finalScore.innerText = `${score} / ${shuffledWords.length}`;
            
            const rank = document.getElementById("rank-message");
            if (score === shuffledWords.length) rank.innerText = "Perfect! You're a true expert! 🏆";
            else if (score >= shuffledWords.length / 2) rank.innerText = "Great job! Almost there! 👍";
            else rank.innerText = "Keep practicing! You can do better! 💪";
        }

        document.getElementById("user-guess").addEventListener("keypress", function(e) {
            if (e.key === "Enter") submitAnswer();
        });

        window.onload = initGame;
    </script>
</body>
</html>
