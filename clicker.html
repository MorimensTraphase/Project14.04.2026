<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hidden Page</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                <p>Click the cash to build your empire!</p>

                <div class="clicker-container">
                    <div class="stats-bar">
                        <h2 style="color: #00ed9a;">Balance: <span id="balance">0</span> 💵</h2>
                    </div>

                    <div id="coin" class="main-coin" onclick="mineCoin()">💵</div>

                    <div class="button-group" style="display: flex; gap: 15px; justify-content: center; margin: 20px 0;">
                        <a href="games.html" class="action-button btn-reset" style="text-decoration: none;">← Back</a>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000;">🎰 Open Casino</button>
                    </div>

                    <div class="inventory-section">
                        <h3>📦 Your Assets</h3>
                        <div id="items-list" class="items-grid">
                            <p style="opacity: 0.5;"></p>
                        </div>
                    </div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">🎰 Casino</h2>
                        <p>Cost per spin: <span style="color: #ffcc00;">50 💵</span></p>
                        
                        <div id="slot-machine" class="slot-display">? | ? | ?</div>
                        
                        <button class="action-button" onclick="spinSlots()" style="background: #ffcc00; color: #000; font-weight: bold; width: 100%;">SPIN!</button>
                        <p id="casino-msg" style="margin-top: 20px; min-height: 24px; font-weight: bold;"></p>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- ИНИЦИАЛИЗАЦИЯ ДАННЫХ ---
let coins = 0;
let inventory = [];

// --- БАЗА ДАННЫХ ПРЕДМЕТОВ ---
const shopData = {
    clothes: {
        cost: 100,
        items: [
            { name: "Dirty Socks", emoji: "🧦", sellPrice: 5 },
            { name: "Paper Bag Hat", emoji: "🛍️", sellPrice: 15 },
            { name: "Old Sandals", emoji: "🩴", sellPrice: 40 },
            { name: "Basic T-Shirt", emoji: "👕", sellPrice: 80 },
            { name: "Cool Cap", emoji: "🧢", sellPrice: 150 },
            { name: "Streetwear Hoodie", emoji: "🧥", sellPrice: 400 },
            { name: "Designer Suit", emoji: "🕴️", sellPrice: 1200 },
            { name: "Diamond Watch", emoji: "⌚", sellPrice: 5000 },
            { name: "Golden Sneakers", emoji: "👟", sellPrice: 12000 },
            { name: "Crown of Kings", emoji: "👑", sellPrice: 50000 }
        ]
    },
    tech: {
        cost: 1500,
        items: [
            { name: "Ancient Floppy Disk", emoji: "💾", sellPrice: 50 },
            { name: "Old Radio", emoji: "📻", sellPrice: 200 },
            { name: "GameBoy", emoji: "🕹️", sellPrice: 600 },
            { name: "Mechanical Keyboard", emoji: "⌨️", sellPrice: 1200 },
            { name: "Smartphone", emoji: "📱", sellPrice: 3000 },
            { name: "Gaming Laptop", emoji: "💻", sellPrice: 8000 },
            { name: "VR Headset", emoji: "🥽", sellPrice: 15000 },
            { name: "Supercomputer", emoji: "🖥️", sellPrice: 45000 },
            { name: "Quantum Server", emoji: "🧬", sellPrice: 120000 },
            { name: "AI Mainframe", emoji: "🤖", sellPrice: 500000 }
        ]
    },
    estate: {
        cost: 25000,
        items: [
            { name: "Cardboard Box", emoji: "📦", sellPrice: 100 },
            { name: "Wooden Shack", emoji: "🛖", sellPrice: 2000 },
            { name: "Small Apartment", emoji: "🏢", sellPrice: 15000 },
            { name: "Suburban House", emoji: "🏡", sellPrice: 50000 },
            { name: "Modern Mansion", emoji: "🏰", sellPrice: 200000 },
            { name: "Private Skyscraper", emoji: "🏙️", sellPrice: 800000 },
            { name: "Tropical Island", emoji: "🏝️", sellPrice: 2500000 },
            { name: "Moon Base", emoji: "🌑", sellPrice: 10000000 },
            { name: "Mars Colony", emoji: "🚀", sellPrice: 50000000 },
            { name: "Galactic Empire", emoji: "🌌", sellPrice: 999999999 }
        ]
    }
};

// --- СИСТЕМА СОХРАНЕНИЙ ---
function saveGame() {
    localStorage.setItem('moneyTycoon_coins', coins);
    localStorage.setItem('moneyTycoon_inventory', JSON.stringify(inventory));
}

function loadGame() {
    const savedCoins = localStorage.getItem('moneyTycoon_coins');
    const savedInventory = localStorage.getItem('moneyTycoon_inventory');
    if (savedCoins !== null) coins = parseInt(savedCoins);
    if (savedInventory !== null) inventory = JSON.parse(savedInventory);
    updateUI();
}

// --- ОСНОВНЫЕ ФУНКЦИИ ---
function mineCoin() {
    coins++;
    updateUI();
    saveGame();
}

function toggleCasino() {
    const casino = document.getElementById('casino-overlay');
    casino.style.display = (casino.style.display === 'none' || casino.style.display === '') ? 'flex' : 'none';
}

function sellItem(index) {
    const item = inventory[index];
    coins += item.sellPrice;
    inventory.splice(index, 1);
    updateUI();
    saveGame();
}

// --- ЛОГИКА КАЗИНО ---
function spin(type) {
    const config = shopData[type];
    const msg = document.getElementById('casino-msg');
    const slotDisplay = document.getElementById('slot-machine');

    // Проверка баланса
    if (coins < config.cost) {
        msg.innerText = `Need ${config.cost.toLocaleString()} 💵!`;
        msg.style.color = "#ff4757";
        return;
    }

    coins -= config.cost;
    updateUI();
    
    msg.innerText = "Spinning...";
    msg.style.color = "#ffcc00";
    slotDisplay.innerText = "🌀 | 🌀 | 🌀";

    setTimeout(() => {
        const rand = Math.random() * 100;
        let wonItem = null;

        // ШАНС ПРОИГРЫША: Clothes 50%, Tech 60%, Estate 70%
        let loseChance = (type === 'clothes') ? 50 : (type === 'tech' ? 60 : 70);

        if (rand < loseChance) {
            slotDisplay.innerText = "❌ | ❌ | ❌";
            msg.innerText = "LOST! Try again.";
            msg.style.color = "#ff4757";
        } else {
            const winRand = Math.random() * 1000; 
            const items = config.items;
            
            // Распределение редкости
            if (winRand > 998) wonItem = items[9];      // 0.2% Легендарка
            else if (winRand > 985) wonItem = items[8]; // 1.3%
            else if (winRand > 950) wonItem = items[7]; // 3.5%
            else if (winRand > 880) wonItem = items[6]; // 7%
            else if (winRand > 750) wonItem = items[5]; // 13%
            else if (winRand > 600) wonItem = items[4]; // 15%
            else if (winRand > 400) wonItem = items[3]; // 20%
            else if (winRand > 200) wonItem = items[2]; // 20%
            else if (winRand > 50) wonItem = items[1];  // 15%
            else wonItem = items[0];                   // 5% (самый дешевый)

            inventory.push(wonItem);
            slotDisplay.innerText = `${wonItem.emoji} | ${wonItem.emoji} | ${wonItem.emoji}`;
            msg.innerText = `JACKPOT: ${wonItem.name.toUpperCase()}!`;
            msg.style.color = "#2ed573";
        }
        
        updateUI();
        saveGame();
    }, 800);
}

// --- ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ---
function updateUI() {
    document.getElementById('balance').innerText = coins.toLocaleString();
    const list = document.getElementById('items-list');
    
    if (inventory.length === 0) {
        list.innerHTML = `<p style="opacity: 0.5;">Your assets will appear here...</p>`;
    } else {
        list.innerHTML = inventory.map((item, index) => `
            <div class="item-card">
                <span class="item-emoji">${item.emoji}</span>
                <strong>${item.name}</strong><br>
                <small style="color: #00ed9a;">${item.sellPrice.toLocaleString()} 💵</small><br>
                <button class="btn-sell" onclick="sellItem(${index})">Sell</button>
            </div>
        `).join('');
    }
}

// Загрузка при открытии
window.onload = loadGame;
    </script>
</body>
</html>
