        <main class="container">

                <div class="clicker-container">

                    <div class="button-group" style="margin-top:20px;">
                        <a href="games.html" class="action-button btn-reset" style="text-decoration: none; display: inline-block;">← Back to Menu</a>

                    <div class="casino-content" id="casino-card">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Case Opening</h2>
                        
                        <div class="roulette-wrapper">
                            <div class="selector"></div>
                            <div id="reel" class="reel-horizontal"></div>
                        </div>

                        <p id="casino-msg">Choose your fate!</p>
                        <div class="case-grid" id="case-list"></div>

                        <div id="case-preview-section" class="case-content-preview" style="display: none;">
                            <h4 style="color: #666; font-size: 0.8rem; margin-bottom: 10px;">LOOT TABLE & CHANCES:</h4>
                            <div id="case-items-list" class="items-preview-grid"></div>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

   <script>
        let coins = 0;
        let inventory = [];
        let isSpinning = false;

        // ПЕРЕНАСТРОЕННЫЙ БАЛАНС: Цены выше, стоимость предметов ниже

                {n:"Cable", e:"🔌", p:5000}, {n:"Mouse", e:"🖱️", p:12000}, {n:"Keys", e:"⌨️", p:25000}, {n:"Disc", e:"💿", p:50000}, {n:"Camera", e:"📷", p:100000}, {n:"Phone", e:"📱", p:200000},
                {n:"Tablet", e:"📟", p:400000}, {n:"Monitor", e:"🖥️", p:800000}, {n:"Laptop", e:"💻", p:1500000}, {n:"Server", e:"🏢", p:3000000}, {n:"Drone", e:"🚁", p:6000000}, {n:"AI Cube", e:"🧊", p:12000000}
            ]},
            c4: { n: "Transport", cost: 8000000, icon: "🚗", items: [
                {n:"Wheel", e:"🎡", p:200000}, {n:"Bike", e:"🚲", p:500000}, {n:"Scooter", e:"🛴", p:1000000}, {n:"Moped", e:"🛵", p:2000000}, {n:"Cart", e:"🛒", p:4000000}, {n:"Car", e:"🚗", p:8000000},
                {n:"SUV", e:"🚙", p:15000000}, {n:"Truck", e:"🚚", p:30000000}, {n:"Bus", e:"🚌", p:70000000}, {n:"Train", e:"🚆", p:150000000}, {n:"Plane", e:"🛩️", p:400000000}, {n:"Hypercar", e:"🏎️", p:1000000000}
            ]},
            c5: { n: "Property", cost: 500000000, icon: "🏠", items: [
                {n:"Fence", e:"🚧", p:10000000}, {n:"Shed", e:"🏚️", p:25000000}, {n:"Room", e:"🚪", p:60000000}, {n:"Tent", e:"⛺", p:150000000}, {n:"House", e:"🏠", p:350000000}, {n:"Villa", e:"🏡", p:800000000},
                {n:"Hotel", e:"🏨", p:2000000000}, {n:"Office", e:"🏢", p:5000000000}, {n:"Bank", e:"🏦", p:12000000000}, {n:"Castle", e:"🏰", p:25000000000}, {n:"Island", e:"🏝️", p:60000000000}, {n:"City", e:"🏙️", p:150000000000}
            ]},
            c6: { n: "Aviation", cost: 100000000000, icon: "🚁", items: [
                {n:"Propeller", e:"⚙️", p:2000000000}, {n:"Glider", e:"🪂", p:5000000000}, {n:"Copter", e:"🚁", p:12000000000}, {n:"Jet", e:"✈️", p:30000000000}, {n:"Airliner", e:"🛫", p:80000000000}, {n:"Stealth", e:"🛸", p:200000000000},
                {n:"Rocket", e:"🚀", p:500000000000}, {n:"Shuttle", e:"🛰️", p:1200000000000}, {n:"Station", e:"🚉", p:3000000000000}, {n:"Base", e:"🌑", p:8000000000000}, {n:"Portal", e:"🌀", p:20000000000000}, {n:"DeathStar", e:"🪐", p:100000000000000}
            ]},
            c7: { n: "Magic", cost: 50000000000000, icon: "🔮", items: [
                {n:"Dust", e:"✨", p:1000000000000}, {n:"Herb", e:"🌿", p:2500000000000}, {n:"Potion", e:"🧪", p:6000000000000}, {n:"Scroll", e:"📜", p:15000000000000}, {n:"Staff", e:"🦯", p:40000000000000}, {n:"Crystal", e:"🔮", p:100000000000000},
                {n:"Amulet", e:"📿", p:250000000000000}, {n:"Sword", e:"⚔️", p:600000000000000}, {n:"Shield", e:"🛡️", p:1500000000000000}, {n:"Grimoire", e:"📙", p:4000000000000000}, {n:"Dragon", e:"🐲", p:12000000000000000}, {n:"HolyGrail", e:"🏆", p:50000000000000000}
            ]},
            c8: { n: "Galaxy", cost: 25000000000000000, icon: "🌌", items: [
                {n:"Meteor", e:"☄️", p:500000000000000}, {n:"Moon", e:"🌙", p:1500000000000000}, {n:"Mars", e:"🔴", p:4000000000000000}, {n:"Saturn", e:"🪐", p:10000000000000000}, {n:"Sun", e:"☀️", p:30000000000000000}, {n:"Pulsar", e:"⚡", p:80000000000000000},
                {n:"BlackHole", e:"🕳️", p:200000000000000000}, {n:"Nebula", e:"☁️", p:500000000000000000}, {n:"Constel", e:"🌠", p:1500000000000000000}, {n:"Galaxy", e:"🌀", p:5000000000000000000}, {n:"Cluster", e:"🎆", p:20000000000000000000}, {n:"Cosmos", e:"🌌", p:100000000000000000000}
            ]},
            c9: { n: "Mythical", cost: 100000000000000000000, icon: "🔱", items: [
                {n:"Relic", e:"🏺", p:2000000000000000000}, {n:"Artifact", e:"🗿", p:5000000000000000000}, {n:"Eye", e:"👁️", p:15000000000000000000}, {n:"Heart", e:"❤️", p:40000000000000000000}, {n:"Thunder", e:"🌩️", p:100000000000000000000}, {n:"Kraken", e:"🐙", p:250000000000000000000},
                {n:"Phoenix", e:"🔥", p:700000000000000000000}, {n:"Titan", e:"🗿", p:2000000000000000000000}, {n:"Soul", e:"👻", p:5000000000000000000000}, {n:"Godly", e:"😇", p:15000000000000000000000}, {n:"Origin", e:"🔘", p:50000000000000000000000}, {n:"Creator", e:"👑", p:250000000000000000000000}
            ]},
            c10: { n: "Ultimate", cost: 1000000000000000000000000, icon: "💎", items: [
                {n:"Light", e:"🌈", p:20000000000000000000000}, {n:"Time", e:"⏳", p:50000000000000000000000}, {n:"Void", e:"🕳️", p:150000000000000000000000}, {n:"Antimat", e:"⚛️", p:400000000000000000000000}, {n:"Binary", e:"🔢", p:1000000000000000000000000}, {n:"Quantum", e:"🔬", p:3000000000000000000000000},
                {n:"Glitch", e:"👾", p:8000000000000000000000000}, {n:"Matrix", e:"📺", p:25000000000000000000000000}, {n:"Infinit", e:"♾️", p:70000000000000000000000000}, {n:"Eternity", e:"🕰️", p:200000000000000000000000000}, {n:"Victory", e:"🚩", p:500000000000000000000000000}, {n:"Glow", e:"🌟", p:999999999999999999999999999}
            ]},
            c11: { n: "Impossible", cost: 1000000000000000000000000000, icon: "💀", items: [
                {n:"Universe", e:"🌌", p: Infinity, isUniverse: true}
            ]}
        };

        function mine() { coins++; render(); save(); }
        function save() { localStorage.setItem('tycoon_v3', coins); localStorage.setItem('inv_v3', JSON.stringify(inventory)); }
        function load() {
            coins = parseInt(localStorage.getItem('tycoon_v3')) || 0;
            inventory = JSON.parse(localStorage.getItem('inv_v3')) || [];
            render(); generateCaseButtons();
        }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none') ? 'flex' : 'none';
        }

        function getRarityData(idx, isUniverse = false) {
            if (isUniverse) return { class: 'rarity-universe', color: '#00ffff', prefix: '🌌 DIVINE: ' };
            if (idx >= 11) return { class: 'rarity-legendary', color: '#ffcc00', prefix: '⚡ LEGENDARY: ' };
            if (idx >= 9)  return { class: 'rarity-mythic', color: '#ff4757', prefix: '🔥 MYTHIC: ' };
            if (idx >= 7)  return { class: 'rarity-epic', color: '#a55eea', prefix: '🟣 EPIC: ' };
            if (idx >= 5)  return { class: 'rarity-rare', color: '#45aaf2', prefix: '🔵 RARE: ' };
            return { class: 'rarity-common', color: '#26de81', prefix: '🟢 COMMON: ' };
        }

        function showPreview(id) {
            const box = document.getElementById('case-items-list');
            document.getElementById('case-preview-section').style.display = 'block';
            let itemsHtml = '';

            if(id === 'c11') {
                itemsHtml += `<div class="preview-item-wrapper"><div class="preview-icon-box" style="border-bottom: 2px solid #444;">💨</div><span class="chance-label">99.9%</span></div>`;
                itemsHtml += `<div class="preview-item-wrapper"><div class="preview-icon-box rarity-universe" style="border-bottom: 2px solid #00ffff;">🌌</div><span class="chance-label">0.1%</span></div>`;
            } else {
                itemsHtml += `<div class="preview-item-wrapper"><div class="preview-icon-box" style="border-bottom: 2px solid #444;">💨</div><span class="chance-label">15%</span></div>`;
                itemsHtml += shopData[id].items.map((it, idx) => {
                    const r = getRarityData(idx, it.isUniverse);
                    let ch = (idx < 5) ? "50%" : (idx < 7) ? "20%" : (idx < 9) ? "10%" : (idx < 11) ? "3%" : "1%";
                    return `<div class="preview-item-wrapper"><div class="preview-icon-box" style="border-bottom: 2px solid ${r.color};">${it.e}</div><span class="chance-label">${ch}</span></div>`;
                }).join('');
            }
            box.innerHTML = itemsHtml;
        }

        function generateCaseButtons() {
            document.getElementById('case-list').innerHTML = Object.keys(shopData).map(id => `
                <div class="case-card" onclick="handleOpen('${id}')" onmouseover="showPreview('${id}')">
                    <span class="case-icon">${shopData[id].icon}</span>
                    <span class="case-name">${shopData[id].n}</span>
                    <span class="case-price">${shopData[id].cost.toLocaleString()} ⭐</span>
                </div>
            `).join('');
        }

        function handleOpen(id) {
            if (isSpinning) return;
            if (coins < shopData[id].cost) { alert("Not enough ⭐!"); return; }
            spin(id);
        }

        function calculateWinner(id) {
            const box = shopData[id];
            const luck = Math.random() * 100;
            if (id === 'c11') {
                if (luck < 99.9) return {n: "Empty", e: "💨", p: 0, fail: true};
                return {...box.items[0], ...getRarityData(0, true), fail: false};
            } else {
                if (luck <= 1) return {...box.items[11], ...getRarityData(11), fail: false};
                if (luck <= 4) return {...box.items[9 + Math.floor(Math.random() * 2)], ...getRarityData(9), fail: false};
                if (luck <= 14) return {...box.items[7 + Math.floor(Math.random() * 2)], ...getRarityData(7), fail: false};
                if (luck <= 34) return {...box.items[5 + Math.floor(Math.random() * 2)], ...getRarityData(5), fail: false};
                if (luck <= 84) return {...box.items[Math.floor(Math.random() * 5)], ...getRarityData(0), fail: false};
                return {n: "Empty", e: "💨", p: 0, fail: true};
            }
        }

        function spin(id) {
            coins -= shopData[id].cost;
            isSpinning = true;
            render();
            const reel = document.getElementById('reel');
            const card = document.getElementById('casino-card');
            const msg = document.getElementById('casino-msg');
            const result = calculateWinner(id);

            let tape = '';
            for(let i=0; i<65; i++) {
                let rIdx = Math.floor(Math.random() * shopData[id].items.length);
                let rItem = shopData[id].items[rIdx];
                let rRare = getRarityData(rIdx, rItem.isUniverse);
                tape += `<div class="reel-item-horizontal ${rRare.class}">${rItem.e}</div>`;
            }
            reel.innerHTML = tape;
            reel.style.transition = 'none';
            reel.style.transform = 'translateX(0)';

            const items = reel.querySelectorAll('.reel-item-horizontal');
            items[55].innerText = result.e;
            items[55].className = `reel-item-horizontal ${result.class || ''}`;

            setTimeout(() => {
                const itemWidth = 126; 
                const stopPos = (55 * itemWidth) - (card.offsetWidth / 2) + (itemWidth / 2);
                reel.style.transition = 'transform 4s cubic-bezier(0.1, 0, 0.1, 1)';
                reel.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                if (result.fail) {
                    msg.innerText = "Empty Case... 💨";
                    msg.style.color = "#ff4757";
                } else {
                    inventory.push(result);
                    msg.innerText = `${result.prefix}${result.n.toUpperCase()}!`;
                    msg.style.color = result.color;
                }
                render(); save();
            }, 4100);
        }

        function sell(i) {
            if (inventory[i].p === Infinity) { alert("Cannot sell the Universe!"); return; }
            coins += inventory[i].p;
            inventory.splice(i, 1);
            render(); save();
        }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            document.getElementById('items-list').innerHTML = inventory.map((item, i) => `
                <div class="item-card ${item.class || ''}" style="border-bottom: 4px solid ${item.color || '#333'}">
                    <span style="font-size:3rem;">${item.e}</span>
                    <strong style="display:block;">${item.n}</strong>
                    <small style="color: #00ed9a;">${item.p === Infinity ? '∞' : item.p.toLocaleString()} ⭐</small>
                    <button class="btn-sell" onclick="sell(${i})">Sell</button>
                </div>
            `).join('');
        }

        window.onload = load;
    </script>
</body>
