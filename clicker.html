<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Money Tycoon - Extreme Edition</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css">
    <style>
        /* Стили для анимации прокрутки */
        .slot-anim { animation: spin 0.1s infinite; }
        @keyframes spin {
            0% { transform: translateY(-5px); opacity: 0.5; }
            100% { transform: translateY(5px); opacity: 1; }
        }
        .casino-buttons {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 10px;
            max-height: 400px;
            overflow-y: auto;
            padding: 10px;
        }
    </style>
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                <div class="stats-bar">
                    <h2 style="color: #00ed9a;">Balance: <span id="balance">0</span> 💵</h2>
                </div>

                <div class="clicker-container">
                    <div id="coin" class="main-coin" onclick="mine()">💵</div>
                    <div class="button-group" style="display: flex; gap: 10px; justify-content: center;">
                        <button class="action-button" onclick="window.location.href='games.html'" style="background: #007bff;">← Back</button>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000;">🎰 Cases</button>
                    </div>
                </div>

                <div class="inventory-section">
                    <h3>📦 Your Assets</h3>
                    <div id="items-list" class="items-grid"></div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content" style="max-width: 600px;">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Case Opening</h2>
                        <div id="slot-machine" class="slot-display" style="font-size: 3rem; margin: 20px 0;">❓</div>
                        <p id="casino-msg">Choose your risk:</p>
                        
                        <div class="casino-buttons" id="case-list">
                            </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let coins = 0;
        let inventory = [];

        // Конфигурация 10 кейсов
        const shopData = {
            c1: { n: "Starter", cost: 50, items: [
                {n:"Paper", e:"📄", p:5}, {n:"Clip", e:"📎", p:10}, {n:"Pen", e:"🖋️", p:20}, {n:"Eraser", e:"🧼", p:30}, {n:"Note", e:"📝", p:40},
                {n:"Coin", e:"🪙", p:70}, {n:"Wallet", e:"👛", p:100}, {n:"Watch", e:"⌚", p:250}, {n:"Phone", e:"📱", p:500}, {n:"Ring", e:"💍", p:1200}
            ]},
            c2: { n: "Basic", cost: 500, items: [
                {n:"Stone", e:"🪨", p:50}, {n:"Wood", e:"🪵", p:100}, {n:"Iron", e:"⛓️", p:200}, {n:"Coal", e:"⬛", p:300}, {n:"Glass", e:"🍷", p:400},
                {n:"Bronze", e:"🥉", p:700}, {n: "Silver", e:"🥈", p:1200}, {n:"Gold", e:"🥇", p:3000}, {n:"Ruby", e:"🧧", p:7000}, {n:"Saphire", e:"🧿", p:15000}
            ]},
            c3: { n: "Gamer", cost: 5000, items: [
                {n:"Cable", e:"🔌", p:500}, {n:"Case", e:"📦", p:1000}, {n:"Fan", e:"🌀", p:2000}, {n:"RAM", e:"📏", p:3000}, {n:"SSD", e:"💾", p:4000},
                {n:"CPU", e:"🧠", p:7000}, {n:"Mouse", e:"🖱️", p:12000}, {n:"Keyboard", e:"⌨️", p:25000}, {n:"GPU", e:"📟", p:60000}, {n:"Setup", e:"🖥️", p:150000}
            ]},
            c4: { n: "Street", cost: 25000, items: [
                {n:"Tire", e:"🛞", p:2000}, {n:"Fuel", e:"⛽", p:5000}, {n:"Helmet", e:"🪖", p:10000}, {n:"Seat", e:"💺", p:15000}, {n:"Radio", e:"📻", p:20000},
                {n:"Scooter", e:"🛴", p:35000}, {n:"Bike", e:"🚲", p:70000}, {n:"Motor", e:"🏍️", p:150000}, {n:"Cart", e:"🛒", p:400000}, {n:"Truck", e:"🚚", p:1000000}
            ]},
            c5: { n: "Luxury", cost: 100000, items: [
                {n:"Wine", e:"🍾", p:10000}, {n:"Cigar", e:"🚬", p:25000}, {n:"Perfume", e:"🧪", p:40000}, {n:"Suit", e:"👔", p:60000}, {n:"Shoes", e:"👞", p:80000},
                {n:"Limo", e:"🚘", p:150000}, {n:"Piano", e:"🎹", p:300000}, {n:"Painting", e:"🖼️", p:800000}, {n:"Statue", e:"🗿", p:2000000}, {n:"Crown", e:"👑", p:5000000}
            ]},
            c6: { n: "Sea", cost: 500000, items: [
                {n:"Hook", e:"🪝", p:50000}, {n:"Net", e:"🕸️", p:100000}, {n:"Oar", e:"🛶", p:200000}, {n:"Anchor", e:"⚓", p:300000}, {n:"Sail", e:"⛵", p:400000},
                {n:"Boat", e:"🚤", p:700000}, {n:"Yacht", e:"🛥️", p:1500000}, {n:"Ship", e:"🚢", p:4000000}, {n:"Sub", e:"🤿", p:10000000}, {n:"Atlantis", e:"🔱", p:30000000}
            ]},
            c7: { n: "Tech", cost: 1000000, items: [
                {n:"Battery", e:"🔋", p:100000}, {n:"Tool", e:"🛠️", p:200000}, {n:"Laser", e:"🔦", p:400000}, {n:"Drone", e:"🚁", p:600000}, {n:"Radar", e:"📡", p:800000},
                {n:"Robot", e:"🤖", p:1500000}, {n:"Server", e:"🖥️", p:4000000}, {n:"Super PC", e:"🔮", p:10000000}, {n:"Cyborg", e:"🦾", p:25000000}, {n:"AI Hub", e:"🧠", p:70000000}
            ]},
            c8: { n: "Space", cost: 5000000, items: [
                {n:"Dust", e:"🌪️", p:500000}, {n:"Rock", e:"☄️", p:1000000}, {n:"Tank", e:"🧪", p:2000000}, {n:"Suit", e:"👨‍🚀", p:3000000}, {n:"Flag", e:"🏁", p:4000000},
                {n:"Rover", e:"🚜", p:8000000}, {n:"Sputnik", e:"🛰️", p:20000000}, {n:"Shuttle", e: "🚀", p:50000000}, {n:"Base", e:"🏗️", p:150000000}, {n:"Moon", e:"🌑", p:500000000}
            ]},
            c9: { n: "Godly", cost: 8000000, items: [
                {n:"Sand", e:"⏳", p:1000000}, {n:"Water", e:"💧", p:2000000}, {n:"Air", e:"🌬️", p:3000000}, {n:"Fire", e:"🔥", p:5000000}, {n:"Life", e:"🌱", p:7000000},
                {n:"Sun", e:"☀️", p:15000000}, {n:"Galaxy", e:"🌀", p:50000000}, {n:"Portal", e:"🕳️", p:200000000}, {n:"God", e:"✨", p:800000000}, {n:"All", e:"🌌", p:2000000000}
            ]},
            c10: { n: "All-In", cost: 10000000, items: [
                {n:"TRASH", e:"🗑️", p:100}, // Шанс 90% будет в логике
                {n:"Jackpot", e:"💰", p:50000000}, {n:"Empire", e:"🏢", p:100000000}, {n:"Planet", e:"🌍", p:250000000}, 
                {n:"Star", e:"🌟", p:500000000}, {n:"Void", e:"🌑", p:1000000000}, {n:"Matrix", e:"📟", p:2000000000}, 
                {n:"Reality", e:"🔮", p:5000000000}, {n:"Infinity", e:"♾️", p:10000000000}, {n:"Win Game", e:"🏆", p:99999999999}
            ]}
        };

        function save() {
            localStorage.setItem('tycoon_extreme_v1', coins);
            localStorage.setItem('tycoon_inv_extreme_v1', JSON.stringify(inventory));
        }

        function load() {
            const c = localStorage.getItem('tycoon_extreme_v1');
            const i = localStorage.getItem('tycoon_inv_extreme_v1');
            if (c) coins = parseInt(c);
            if (i) inventory = JSON.parse(i);
            render();
            generateCaseButtons();
        }

        function mine() { coins++; render(); save(); }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none') ? 'flex' : 'none';
        }

        function generateCaseButtons() {
            const container = document.getElementById('case-list');
            container.innerHTML = Object.keys(shopData).map(id => `
                <button class="action-button" onclick="spin('${id}')" style="font-size: 0.8rem;">
                    ${shopData[id].n}<br>(${shopData[id].cost.toLocaleString()})
                </button>
            `).join('');
        }

        function spin(id) {
            const box = shopData[id];
            const msg = document.getElementById('casino-msg');
            const slot = document.getElementById('slot-machine');

            if (coins < box.cost) {
                msg.innerText = "No money! ❌";
                return;
            }

            coins -= box.cost;
            render();
            msg.innerText = "Rolling...";
            slot.classList.add('slot-anim');

            setTimeout(() => {
                slot.classList.remove('slot-anim');
                const winChance = Math.random() * 100;

                // ФИКСИРОВАННЫЙ ШАНС ПРОИГРЫША 50%
                if (winChance < 50) {
                    slot.innerText = "💨";
                    msg.innerText = "Empty Case! 0.00";
                    msg.style.color = "#ff4757";
                } else {
                    let item;
                    // Специальная логика для кейса Все или ничего
                    if (id === 'c10') {
                        const allOrNothing = Math.random() * 100;
                        if (allOrNothing < 90) {
                            item = box.items[0]; // Мусор за 100
                        } else {
                            item = box.items[Math.floor(Math.random() * 9) + 1]; // Один из 9 топовых
                        }
                    } else {
                        // Рандом среди 10 предметов
                        const rarity = Math.random() * 100;
                        let idx;
                        if (rarity > 95) idx = 9;
                        else if (rarity > 85) idx = 8;
                        else if (rarity > 70) idx = 7;
                        else if (rarity > 50) idx = 6;
                        else if (rarity > 30) idx = 5;
                        else idx = Math.floor(Math.random() * 5); // Половина предметов в минус
                        item = box.items[idx];
                    }

                    inventory.push(item);
                    slot.innerText = item.e;
                    msg.innerText = `Win: ${item.n}!`;
                    msg.style.color = "#00ed9a";
                }
                render();
                save();
            }, 1000);
        }

        function sell(index) {
            coins += inventory[index].p;
            inventory.splice(index, 1);
            render();
            save();
        }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            const list = document.getElementById('items-list');
            list.innerHTML = inventory.map((item, i) => `
                <div class="item-card">
                    <span style="font-size:2rem">${item.e}</span><br>
                    <strong>${item.n}</strong><br>
                    <small>${item.p.toLocaleString()} 💵</small><br>
                    <button class="btn-sell" onclick="sell(${i})">Sell</button>
                </div>
            `).join('');
        }

        window.onload = load;
    </script>
</body>
</html>
