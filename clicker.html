<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Money Tycoon</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css?v=1.9">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>⭐ Star Tycoon</h1>
                <div class="stats-bar"><h2>Balance: <span id="balance">0</span> ⭐</h2></div>

                <div class="clicker-container">
                    <div id="coin" class="main-coin" onclick="mine()">⭐</div>
                    <div class="button-group" style="margin-top:20px;">
                        <button class="action-button" onclick="window.location.href='games.html'" style="background: #444; color: white;">← Back</button>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000; font-weight: bold;">🎰 Cases</button>
                    </div>
                </div>

                <div class="inventory-section">
                    <h3>📦 Your Assets</h3>
                    <div id="items-list" class="items-grid"></div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content" id="casino-card">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Secret Cases</h2>
                        
                        <div class="roulette-wrapper">
                            <div class="selector"></div>
                            <div id="reel" class="reel-horizontal"></div>
                        </div>

                        <p id="casino-msg">Good luck!</p>
                        <div class="case-grid" id="case-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let coins = 0;
        let inventory = [];
        let isSpinning = false;

        const shopData = {
            c1: { n: "Common", cost: 50, icon: "📦", items: [
                {n:"Paper", e:"📄", p:5}, {n:"Clip", e:"📎", p:10}, {n:"Pen", e:"🖋️", p:20}, {n:"Note", e:"📝", p:40}, {n:"Envelope", e:"✉️", p:60},
                {n:"Star", e:"⭐", p:100}, {n:"Wallet", e:"👛", p:250}, {n:"Watch", e:"⌚", p:500}, {n:"Phone", e:"📱", p:1000}, {n:"Ring", e:"💍", p:2500}
            ]},
            c2: { n: "Supply", cost: 500, icon: "💼", items: [
                {n:"Brick", e:"🧱", p:50}, {n:"Wood", e:"🪵", p:100}, {n:"Iron", e:"⛓️", p:200}, {n:"Coal", e:"⬛", p:300}, {n:"Hammer", e:"🔨", p:500},
                {n:"Bronze", e:"🥉", p:1000}, {n:"Silver", e:"🥈", p:2500}, {n:"Gold", e:"🥇", p:5000}, {n:"Ruby", e:"💎", p:10000}, {n:"Crown", e:"👑", p:25000}
            ]},
            c3: { n: "Office", cost: 2500, icon: "🖥️", items: [
                {n:"Mouse", e:"🖱️", p:500}, {n:"Keys", e:"⌨️", p:1000}, {n:"Printer", e:"🖨️", p:2500}, {n:"Disk", e:"💾", p:5000}, {n:"Screen", e:"🖥️", p:10000},
                {n:"Laptop", e:"💻", p:20000}, {n:"Camera", e:"📷", p:40000}, {n:"Server", e:"🏢", p:80000}, {n:"Satellite", e:"🛰️", p:150000}, {n:"AI", e:"🤖", p:300000}
            ]},
            c4: { n: "Garage", cost: 15000, icon: "🚗", items: [
                {n:"Wrench", e:"🔧", p:2000}, {n:"Pliers", e:"✂️", p:4000}, {n:"Bolt", e:"🔩", p:7000}, {n:"Battery", e:"🔋", p:12000}, {n:"Gear", e:"⚙️", p:25000},
                {n:"Scooter", e:"🛴", p:50000}, {n:"Bike", e:"🚲", p:100000}, {n:"Car", e:"🚗", p:300000}, {n:"Truck", e:"🚚", p:600000}, {n:"Tractor", e:"🚜", p:1200000}
            ]},
            c5: { n: "Living", cost: 80000, icon: "🏠", items: [
                {n:"Chair", e:"🪑", p:10000}, {n:"Picture", e:"🖼️", p:25000}, {n:"TV", e:"📺", p:50000}, {n:"Bed", e:"🛏️", p:100000}, {n:"Door", e:"🚪", p:200000},
                {n:"Tent", e:"⛺", p:400000}, {n:"House", e:"🏠", p:1000000}, {n:"Hotel", e:"🏨", p:2500000}, {n:"Mansion", e:"🏰", p:7000000}, {n:"Bank", e:"🏦", p:15000000}
            ]},
            c6: { n: "Flight", cost: 400000, icon: "✈️", items: [
                {n:"Ticket", e:"🎫", p:50000}, {n:"Map", e:"🗺️", p:100000}, {n:"Compass", e:"🧭", p:250000}, {n:"Balloon", e:"🎈", p:500000}, {n:"Gift", e:"🎁", p:1000000},
                {n:"Copter", e:"🚁", p:3000000}, {n:"Plane", e:"✈️", p:10000000}, {n:"Rocket", e:"🚀", p:40000000}, {n:"Sun", e:"☀️", p:100000000}, {n:"Moon", e:"🌙", p:250000000}
            ]},
            c7: { n: "Nature", cost: 2000000, icon: "🌲", items: [
                {n:"Seed", e:"🌱", p:200000}, {n:"Flower", e:"🌻", p:500000}, {n:"Tree", e:"🌲", p:1500000}, {n:"Cactus", e:"🌵", p:4000000}, {n:"Island", e:"🏝️", p:10000000},
                {n:"Mountain", e:"🏔️", p:30000000}, {n:"Volcano", e:"🌋", p:80000000}, {n:"Ocean", e:"🌊", p:200000000}, {n:"Earth", e:"🌍", p:600000000}, {n:"Spark", e:"✨", p:1500000000}
            ]},
            c8: { n: "Ancient", cost: 10000000, icon: "🏺", items: [
                {n:"Key", e:"🔑", p:1000000}, {n:"Anchor", e:"⚓", p:3000000}, {n:"Scroll", e:"📜", p:8000000}, {n:"Book", e:"📖", p:20000000}, {n:"Sword", e:"⚔️", p:50000000},
                {n:"Shield", e:"🛡️", p:120000000}, {n:"Candle", e:"🕯️", p:300000000}, {n:"Trophy", e:"🏆", p:800000000}, {n:"Statue", e:"🗿", p:2000000000}, {n:"Artifact", e:"🔮", p:5000000000}
            ]},
            c9: { n: "Rich", cost: 100000000, icon: "💎", items: [
                {n:"Crystal", e:"🔮", p:10000000}, {n:"Blue Gem", e:"🔷", p:30000000}, {n:"Cards", e:"💳", p:100000000}, {n:"Clock", e:"⏰", p:300000000}, {n:"Vault", e:"🔒", p:800000000},
                {n:"Red Gem", e:"🔻", p:2000000000}, {n:"Diamond", e:"💎", p:6000000000}, {n:"Medal", e:"🏅", p:15000000000}, {n:"Bell", e:"🔔", p:40000000000}, {n:"Jackpot", e:"🎰", p:100000000000}
            ]},
            c10: { n: "Ultimate", cost: 1000000000, icon: "👑", items: [
                {n:"Heart", e:"❤️", p:100000000}, {n:"Fire", e:"🔥", p:500000000}, {n:"Light", e:"💡", p:1500000000}, {n:"Ghost", e:"👻", p:5000000000}, {n:"Alien", e:"👽", p:15000000000},
                {n:"Robot", e:"🤖", p:40000000000}, {n:"Dragon", e:"🐉", p:120000000000}, {n:"Rainbow", e:"🌈", p:400000000000}, {n:"Infinity", e:"♾️", p:1000000000000}, {n:"Victory", e:"🚩", p:5000000000000}
            ]}
        };

        function mine() { coins++; render(); save(); }
        function save() { localStorage.setItem('tycoon_v4', coins); localStorage.setItem('inv_v4', JSON.stringify(inventory)); }
        function load() {
            coins = parseInt(localStorage.getItem('tycoon_v4')) || 0;
            inventory = JSON.parse(localStorage.getItem('inv_v4')) || [];
            render(); generateCaseButtons();
        }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none') ? 'flex' : 'none';
        }

        function generateCaseButtons() {
            document.getElementById('case-list').innerHTML = Object.keys(shopData).map(id => `
                <div class="case-card" onclick="spin('${id}')">
                    <span class="case-icon">${shopData[id].icon}</span>
                    <span class="case-name">${shopData[id].n} Case</span>
                    <span class="case-price">${shopData[id].cost.toLocaleString()} ⭐</span>
                </div>
            `).join('');
        }

        function spin(id) {
            if (isSpinning || coins < shopData[id].cost) return;
            coins -= shopData[id].cost;
            isSpinning = true;
            render();

            const reel = document.getElementById('reel');
            const msg = document.getElementById('casino-msg');
            const box = shopData[id];
            
            const r = Math.random() * 100;
            let idx = r > 98 ? 9 : r > 90 ? 8 : r > 75 ? 7 : r > 55 ? 6 : r > 35 ? 5 : Math.floor(Math.random()*5);
            let color = idx > 8 ? "#eb4b4b" : idx > 6 ? "#d32ee6" : idx > 4 ? "#4b69ff" : "#b0c3d9";
            let result = {...box.items[idx], color: color};

            let tape = '';
            for(let i=0; i<60; i++) {
                let randIdx = Math.floor(Math.random() * box.items.length);
                let randColor = randIdx > 8 ? "#eb4b4b" : randIdx > 6 ? "#d32ee6" : randIdx > 4 ? "#4b69ff" : "#b0c3d9";
                tape += `
                    <div class="reel-item-horizontal">
                        <span class="emoji-display">${box.items[randIdx].e}</span>
                        <div class="rarity-bar" style="color:${randColor}; background-color: currentColor;"></div>
                    </div>`;
            }
            reel.innerHTML = tape;
            reel.style.transition = 'none';
            reel.style.transform = 'translateX(0)';

            const items = reel.querySelectorAll('.reel-item-horizontal');
            items[55].querySelector('.emoji-display').innerText = result.e;
            items[55].querySelector('.rarity-bar').style.color = result.color;

            setTimeout(() => {
                const itemWidth = 126;
                const stopPos = (55 * itemWidth) - (document.getElementById('casino-card').offsetWidth / 2) + (itemWidth / 2);
                reel.style.transition = 'transform 4.5s cubic-bezier(0.1, 0, 0.1, 1)';
                reel.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                inventory.push(result);
                msg.innerText = `GOT: ${result.n}!`;
                msg.style.color = result.color;
                render(); save();
            }, 4600);
        }

        function sell(i) { coins += inventory[i].p; inventory.splice(i, 1); render(); save(); }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            document.getElementById('items-list').innerHTML = inventory.map((item, i) => `
                <div class="item-card" style="border-bottom: 4px solid ${item.color || '#333'}">
                    <span style="font-size:3rem; filter: drop-shadow(0 0 10px ${item.color}44)">${item.e}</span>
                    <strong style="display:block; margin-top:5px;">${item.n}</strong>
                    <small style="color: #00ed9a;">${item.p.toLocaleString()} ⭐</small>
                    <button class="btn-sell" onclick="sell(${i})">Sell</button>
                </div>
            `).join('');
        }

        window.onload = load;
    </script>
</body>
</html>
