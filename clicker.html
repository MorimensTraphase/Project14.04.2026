<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Money Tycoon</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css?v=1.8">
    <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Games</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                <div class="stats-bar"><h2>Balance: <span id="balance">0</span> 💵</h2></div>

                <div class="clicker-container">
                    <div id="coin" class="main-coin" onclick="mine()">💵</div>
                    <div class="button-group" style="margin-top:20px;">
                        <button class="action-button" onclick="window.location.href='games.html'" style="background: #444; color: white;">← Back</button>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000; font-weight: bold;">🎰 Cases</button>
                    </div>
                </div>

                <div class="inventory-section">
                    <h3>📦 Your Assets</h3>
                    <div id="items-list" class="items-grid"></div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content" id="casino-card">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Secret Cases</h2>
                        
                        <div class="roulette-wrapper">
                            <div class="selector"></div>
                            <div id="reel" class="reel-horizontal"></div>
                        </div>

                        <p id="casino-msg">Good luck!</p>
                        <div class="case-grid" id="case-list"></div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        let coins = 0;
        let inventory = [];
        let isSpinning = false;

        // Данные кейсов с разрешенными на ноутах эмодзи
        const shopData = {
            c1: { n: "Starter", cost: 50, icon: "📦", items: [
                {n:"Paper", e:"📄", p:5}, {n:"Clip", e:"📎", p:10}, {n:"Pen", e:"🖋️", p:20}, {n:"Eraser", e:"🧽", p:30}, {n:"Note", e:"📝", p:40},
                {n:"Coin", e:"🪙", p:70}, {n:"Wallet", e:"👛", p:100}, {n:"Watch", e:"⌚", p:250}, {n:"Phone", e:"📱", p:500}, {n:"Ring", e:"💍", p:1200}
            ]},
            c2: { n: "Basic", cost: 500, icon: "💼", items: [
                {n:"Stone", e:"🪨", p:50}, {n:"Wood", e:"🪵", p:100}, {n:"Iron", e:"⛓️", p:200}, {n:"Coal", e:"⬛", p:300}, {n:"Glass", e:"🍷", p:400},
                {n:"Bronze", e:"🥉", p:700}, {n: "Silver", e:"🥈", p:1200}, {n:"Gold", e:"🥇", p:3000}, {n:"Ruby", e:"💎", p:7000}, {n:"Saphire", e:"🔮", p:15000}
            ]},
            c3: { n: "Gamer", cost: 5000, icon: "⌨️", items: [
                {n:"Cable", e:"🔌", p:500}, {n:"Case", e:"📦", p:1000}, {n:"Fan", e:"🌀", p:2000}, {n:"RAM", e:"📏", p:3000}, {n:"Disk", e:"💾", p:4000},
                {n:"CPU", e:"🧠", p:7000}, {n:"Mouse", e:"🖱️", p:12000}, {n:"Keys", e:"⌨️", p:25000}, {n:"GPU", e:"📟", p:60000}, {n:"PC", e:"🖥️", p:150000}
            ]},
            c10: { n: "All-In", cost: 10000000, icon: "🔥", items: [
                {n:"TRASH", e:"🗑️", p:100}, {n:"Jackpot", e:"💰", p:50000000}, {n:"Empire", e:"🏢", p:100000000}, {n:"Planet", e:"🌍", p:250000000}, 
                {n:"Star", e:"🌟", p:500000000}, {n:"Void", e:"🌑", p:1000000000}, {n:"Matrix", e:"📟", p:2000000000}, 
                {n:"Reality", e:"🔮", p:5000000000}, {n:"Infinity", e:"♾️", p:10000000000}, {n:"Trophy", e:"🏆", p:99999999999}
            ]}
        };

        function mine() { coins++; render(); save(); }
        
        function save() { 
            localStorage.setItem('tycoon_v3', coins); 
            localStorage.setItem('inv_v3', JSON.stringify(inventory)); 
        }

        function load() {
            coins = parseInt(localStorage.getItem('tycoon_v3')) || 0;
            inventory = JSON.parse(localStorage.getItem('inv_v3')) || [];
            render(); 
            generateCaseButtons();
        }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none') ? 'flex' : 'none';
        }

        function generateCaseButtons() {
            document.getElementById('case-list').innerHTML = Object.keys(shopData).map(id => `
                <div class="case-card" onclick="spin('${id}')">
                    <span class="case-icon">${shopData[id].icon}</span>
                    <span class="case-name">${shopData[id].n} Case</span>
                    <span class="case-price">${shopData[id].cost.toLocaleString()} 💵</span>
                </div>
            `).join('');
        }

        function spin(id) {
            if (isSpinning || coins < shopData[id].cost) return;
            coins -= shopData[id].cost;
            isSpinning = true;
            render();

            const reel = document.getElementById('reel');
            const msg = document.getElementById('casino-msg');
            const box = shopData[id];
            
            // Логика выпадения (шансы)
            const r = Math.random() * 100;
            let idx = r > 98 ? 9 : r > 90 ? 8 : r > 75 ? 7 : r > 55 ? 6 : r > 35 ? 5 : Math.floor(Math.random()*5);
            let color = idx > 8 ? "#eb4b4b" : idx > 6 ? "#d32ee6" : idx > 4 ? "#4b69ff" : "#b0c3d9";
            let result = {...box.items[idx], color: color};

            // Генерация ленты для прокрутки
            let tape = '';
            for(let i=0; i<60; i++) {
                let randIdx = Math.floor(Math.random() * box.items.length);
                let randColor = randIdx > 8 ? "#eb4b4b" : randIdx > 6 ? "#d32ee6" : randIdx > 4 ? "#4b69ff" : "#b0c3d9";
                tape += `
                    <div class="reel-item-horizontal">
                        <span class="emoji-display">${box.items[randIdx].e}</span>
                        <div class="rarity-bar" style="color:${randColor}; background-color: currentColor;"></div>
                    </div>`;
            }
            reel.innerHTML = tape;
            reel.style.transition = 'none';
            reel.style.transform = 'translateX(0)';

            // Установка финального приза
            const items = reel.querySelectorAll('.reel-item-horizontal');
            items[55].querySelector('.emoji-display').innerText = result.e;
            items[55].querySelector('.rarity-bar').style.color = result.color;

            // Запуск анимации
            setTimeout(() => {
                const itemWidth = 126; // 120px + 6px margin
                const centerShift = document.getElementById('casino-card').offsetWidth / 2;
                const stopPos = (55 * itemWidth) - centerShift + (itemWidth / 2);
                reel.style.transition = 'transform 4.5s cubic-bezier(0.1, 0, 0.1, 1)';
                reel.style.transform = `translateX(-${stopPos}px)`;
            }, 50);

            setTimeout(() => {
                isSpinning = false;
                inventory.push(result);
                msg.innerText = `YOU GOT: ${result.n}!`;
                msg.style.color = result.color;
                render(); 
                save();
            }, 4600);
        }

        function sell(i) {
            coins += inventory[i].p;
            inventory.splice(i, 1);
            render();
            save();
        }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            document.getElementById('items-list').innerHTML = inventory.map((item, i) => `
                <div class="item-card" style="border-bottom: 4px solid ${item.color || '#333'}">
                    <span style="font-size:3rem; filter: drop-shadow(0 0 10px ${item.color}44)">${item.e}</span>
                    <strong style="display:block; margin-top:5px;">${item.n}</strong>
                    <small style="color: #00ed9a;">${item.p.toLocaleString()} 💵</small>
                    <button class="btn-sell" onclick="sell(${i})">Sell</button>
                </div>
            `).join('');
        }

        window.onload = load;
    </script>
</body>
</html>
