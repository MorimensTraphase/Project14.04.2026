<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Hidden Page</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
    <link rel="stylesheet" href="css/clicker.css">
</head>
<body> 
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <h1>💵 Money Tycoon</h1>
                
                <div class="stats-bar">
                    <h2 style="color: #00ed9a;">Balance: <span id="balance">0</span> 💵</h2>
                </div>

                <div class="clicker-container">
                    <div id="coin" class="main-coin" onclick="mine()">💵</div>
                    
                    <div class="button-group" style="display: flex; gap: 10px; justify-content: center;">
                        <button class="action-button" onclick="window.location.href='games.html'">← Back</button>
                        <button class="action-button" onclick="toggleCasino()" style="background: #ffcc00; color: #000;">🎰 Casino</button>
                    </div>
                </div>

                <div class="inventory-section">
                    <h3>📦 Your Assets</h3>
                    <div id="items-list" class="items-grid">
                    </div>
                </div>

                <div id="casino-overlay" class="casino-overlay" style="display: none;">
                    <div class="casino-content">
                        <button class="close-btn" onclick="toggleCasino()">×</button>
                        <h2 style="color: #ffcc00;">Secret Market</h2>
                        <div id="slot-machine" class="slot-display">? | ? | ?</div>
                        <p id="casino-msg">Select a box to open:</p>
                        
                        <div class="casino-buttons" style="display: flex; flex-direction: column; gap: 10px;">
                            <button class="action-button" onclick="spin('clothes')">📦 Clothes Box (100 💵)</button>
                            <button class="action-button" onclick="spin('tech')">💻 Tech Box (1,500 💵)</button>
                            <button class="action-button" onclick="spin('estate')">🏰 Estate Box (25,000 💵)</button>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // --- ДАННЫЕ ИГРЫ ---
        let coins = 0;
        let inventory = [];

        const shopData = {
            clothes: { cost: 100, lose: 50, items: [
                {n: "Socks", e: "🧦", p: 10}, {n: "Cap", e: "🧢", p: 150}, {n: "Hoodie", e: "🧥", p: 500}, {n: "Suit", e: "🕴️", p: 2500}
            ]},
            tech: { cost: 1500, lose: 60, items: [
                {n: "Phone", e: "📱", p: 3000}, {n: "Laptop", e: "💻", p: 10000}, {n: "Server", e: "🧬", p: 45000}, {n: "AI", e: "🤖", p: 200000}
            ]},
            estate: { cost: 25000, lose: 75, items: [
                {n: "Garage", e: "🏚️", p: 5000}, {n: "Villa", e: "🏰", p: 150000}, {n: "Island", e: "🏝️", p: 1500000}, {n: "Empire", e: "🌌", p: 50000000}
            ]}
        };

        // --- СОХРАНЕНИЕ / ЗАГРУЗКА ---
        function save() {
            localStorage.setItem('tycoon_save_coins', coins);
            localStorage.setItem('tycoon_save_inv', JSON.stringify(inventory));
        }

        function load() {
            const c = localStorage.getItem('tycoon_save_coins');
            const i = localStorage.getItem('tycoon_save_inv');
            if (c) coins = parseInt(c);
            if (i) inventory = JSON.parse(i);
            render();
        }

        // --- МЕХАНИКИ ---
        function mine() {
            coins++;
            render();
            save();
        }

        function toggleCasino() {
            const el = document.getElementById('casino-overlay');
            el.style.display = (el.style.display === 'none' || el.style.display === '') ? 'flex' : 'none';
        }

        function spin(type) {
            const box = shopData[type];
            const msg = document.getElementById('casino-msg');
            const slot = document.getElementById('slot-machine');

            if (coins < box.cost) {
                msg.innerText = "Not enough cash! ❌";
                msg.style.color = "#ff4757";
                return;
            }

            coins -= box.cost;
            render();
            msg.innerText = "Spinning...";
            msg.style.color = "#ffcc00";
            slot.innerText = "🌀 | 🌀 | 🌀";

            setTimeout(() => {
                const rand = Math.random() * 100;
                if (rand < box.lose) {
                    slot.innerText = "❌ | ❌ | ❌";
                    msg.innerText = "LOSE! Try again.";
                    msg.style.color = "#ff4757";
                } else {
                    const itemRand = Math.floor(Math.random() * box.items.length);
                    const item = box.items[itemRand];
                    inventory.push(item);
                    slot.innerText = `${item.e} | ${item.e} | ${item.e}`;
                    msg.innerText = `WIN: ${item.n}!`;
                    msg.style.color = "#00ed9a";
                }
                render();
                save();
            }, 700);
        }

        function sell(index) {
            coins += inventory[index].p;
            inventory.splice(index, 1);
            render();
            save();
        }

        function render() {
            document.getElementById('balance').innerText = coins.toLocaleString();
            const list = document.getElementById('items-list');
            if (inventory.length === 0) {
                list.innerHTML = `<p style="opacity: 0.5;">Your assets are empty...</p>`;
            } else {
                list.innerHTML = inventory.map((item, i) => `
                    <div class="item-card">
                        <span class="item-emoji">${item.e}</span>
                        <strong>${item.n}</strong><br>
                        <small>${item.p.toLocaleString()} 💵</small><br>
                        <button class="btn-sell" onclick="sell(${i})">Sell</button>
                    </div>
                `).join('');
            }
        }

        window.onload = load;
    </script>
</body>
</html>
