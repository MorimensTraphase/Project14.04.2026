<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Mini Games - Lobby</title>
    <link rel="stylesheet" href="css/games.css"> 
    <link rel="stylesheet" href="css/video.css">
     <link rel="icon" href="ico.ico?v=2" type="image/x-icon">
</head>
<body>
    <div class="wrapper">
        <header class="container">
            <span class="logo">Mini Games</span>
            <nav>
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="sborki.html">Interesting Facts</a></li>
                    <li><a href="video.html">Videos</a></li>
                    <li><a href="quiz.html">Quizzes</a></li>
                    <li class="active"><a href="games.html">Mini Games</a></li>
                    <li><a href="repleyi.html">Information</a></li>
                </ul>
            </nav>
        </header>

        <main class="container">
            <section class="game-section">
                <div id="game-lobby-screen">
                    <h1 class="lobby-title">Select the game</h1>
                    <div class="game-selection-wrapper">
                        <div class="ui-game-card" onclick="openGame('sorting_game.html')">
                            <h3>🧩 Sorting Master</h3>
                            <p>Divide symbols between UK and Poland.</p>
                            <button class="action-button">Play Now</button>
                        </div>
                    </div>
                </div>

                <div id="game-window-container" style="display: none;">
                    <button onclick="closeGame()" class="action-button btn-reset">← Back to Menu</button>
                    <iframe id="game-frame" src="" style="width: 100%; height: 80vh; border: none; margin-top: 20px;"></iframe>
                </div>
            </section>
        </main>
    </div>

    <script>
        function openGame(url) {
            document.getElementById('game-lobby-screen').style.display = 'none';
            const container = document.getElementById('game-window-container');
            const frame = document.getElementById('game-frame');
            
            frame.src = url;
            container.style.display = 'block';
        }

        function closeGame() {
            const container = document.getElementById('game-window-container');
            const frame = document.getElementById('game-frame');
            
            frame.src = "";
            container.style.display = 'none';
            document.getElementById('game-lobby-screen').style.display = 'block';
        }
    </script>
</body>
</html>
